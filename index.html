<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fair Bet Calculator</title>

    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #f6f6f6;
        margin: 0;
        color: #222;
      }

      .container {
        max-width: 560px;
        margin: 0 auto;
        background: white;
        padding: 28px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 24px;
      }

      label {
        display: block;
        margin-top: 18px;
        font-weight: 600;
      }

      .person-row {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 18px;
      }

      .person-row label {
        margin-top: 0;
      }

      input,
      textarea {
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        font-size: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      button {
        margin-top: 22px;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        background: #222;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #000;
      }

      .result {
        margin-top: 24px;
        padding: 16px;
        border-radius: 10px;
        background: #f1f1f1;
        line-height: 1.6;
      }

      .error {
        background: #ffecec;
        color: #9b1c1c;
      }

      .success {
        background: #eef9f0;
        color: #164b22;
      }

      strong {
        color: inherit;
      }

      @media (min-width: 600px) {
        body {
          padding: 40px;
        }

        .person-row {
          flex-direction: row;
          gap: 14px;
        }

        .person-row > div {
          flex: 1;
          min-width: 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Fair Bet Calculator</h1>

      <form id="betForm">
        <label for="description">What's the bet?</label>
        <textarea id="description"></textarea>

        <div class="person-row">
          <div>
            <label for="personOneName">Person one's name</label>
            <input id="personOneName" type="text" placeholder="Example: Alex" />
          </div>

          <div>
            <label for="personOneProbability"
              >Person one's probability (%)</label
            >
            <input
              id="personOneProbability"
              type="number"
              placeholder="Example: 60"
            />
          </div>
        </div>

        <div class="person-row">
          <div>
            <label for="personTwoName">Person two's name</label>
            <input id="personTwoName" type="text" placeholder="Example: Sam" />
          </div>

          <div>
            <label for="personTwoProbability"
              >Person two's probability (%)</label
            >
            <input
              id="personTwoProbability"
              type="number"
              placeholder="Example: 20"
            />
          </div>
        </div>

        <label for="amount">Total bet amount</label>
        <input id="amount" type="number" placeholder="Example: 100" />

        <button type="submit">Calculate</button>
      </form>

      <div id="result"></div>
    </div>

    <script>
      function calculateBet(probabilityA, probabilityB, totalAmount) {
        if (
          probabilityA <= 0 ||
          probabilityA >= 100 ||
          probabilityB <= 0 ||
          probabilityB >= 100
        ) {
          throw new Error('Probabilities must be between 1 and 99.')
        }

        if (totalAmount <= 0) {
          throw new Error('Bet amount must be greater than 0.')
        }

        if (
          (probabilityA > 50 && probabilityB > 50) ||
          (probabilityA < 50 && probabilityB < 50)
        ) {
          throw new Error(
            'Invalid bet: one probability must be above 50% and the other below 50%.',
          )
        }

        if (probabilityA === 50 || probabilityB === 50) {
          throw new Error('Invalid bet: probabilities cannot be exactly 50%.')
        }

        const totalProbability = probabilityA + probabilityB

        const normalizedA = probabilityA / totalProbability
        const normalizedB = probabilityB / totalProbability

        const stakeA = totalAmount * normalizedA
        const stakeB = totalAmount * normalizedB

        return {
          normalizedA,
          normalizedB,
          stakeA,
          stakeB,
        }
      }

      function formatMoney(value) {
        return `€${value.toFixed(2)}`
      }

      function escapeHtml(value) {
        return value
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;')
      }

      function submitBet(event) {
        event.preventDefault()

        const description = document.getElementById('description').value.trim()
        const personOneName =
          document.getElementById('personOneName').value.trim() || 'Person one'
        const personTwoName =
          document.getElementById('personTwoName').value.trim() || 'Person two'
        const probabilityA = Number(
          document.getElementById('personOneProbability').value,
        )
        const probabilityB = Number(
          document.getElementById('personTwoProbability').value,
        )
        const amount = Number(document.getElementById('amount').value)
        const resultEl = document.getElementById('result')

        try {
          if (!description) {
            throw new Error('Please enter a bet description.')
          }

          if (
            Number.isNaN(probabilityA) ||
            Number.isNaN(probabilityB) ||
            Number.isNaN(amount)
          ) {
            throw new Error('Please fill in all numeric fields.')
          }

          const result = calculateBet(probabilityA, probabilityB, amount)

          const personOneWinsIf =
            probabilityA > 50
              ? 'the event happens'
              : 'the event does not happen'

          const personTwoWinsIf =
            probabilityB > 50
              ? 'the event happens'
              : 'the event does not happen'

          resultEl.className = 'result success'
          resultEl.innerHTML = `
          <strong>Bet:</strong> ${escapeHtml(description)}<br><br>

          <strong>${escapeHtml(personOneName)} should put in:</strong> ${formatMoney(result.stakeA)}<br>
          <strong>${escapeHtml(personTwoName)} should put in:</strong> ${formatMoney(result.stakeB)}<br><br>

          <strong>If ${escapeHtml(personOneName)} is right</strong> and ${personOneWinsIf},
          they win ${formatMoney(result.stakeB)}.<br>

          <strong>If ${escapeHtml(personTwoName)} is right</strong> and ${personTwoWinsIf},
          they win ${formatMoney(result.stakeA)}.<br><br>

          <strong>Normalized split:</strong>
          ${escapeHtml(personOneName)} ${(result.normalizedA * 100).toFixed(2)}% /
          ${escapeHtml(personTwoName)} ${(result.normalizedB * 100).toFixed(2)}%
        `
        } catch (error) {
          resultEl.className = 'result error'
          resultEl.textContent = error.message
        }
      }

      document.getElementById('betForm').addEventListener('submit', submitBet)
    </script>
  </body>
</html>
